<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelley Ryan | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pinterest-bg': '#f9f9f8',
                        'luxury-text': '#222222',
                        'luxury-muted': '#666666',
                        'luxury-accent': '#a68a64',
                        'luxury-card': '#ffffff',
                        'luxury-border': '#eaeaea'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    boxShadow: {
                        'pinterest': '0 4px 20px rgba(0, 0, 0, 0.04)',
                        'pinterest-hover': '0 8px 30px rgba(0, 0, 0, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f9f9f8;
            color: #222222;
            scroll-behavior: smooth;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-in forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            align-items: start;
        }
        /* Mobile Nav Styling */
        @media (max-width: 768px) {
            .nav-link { display: none; }
        }
    </style>
</head>
<body class="antialiased font-sans selection:bg-luxury-accent selection:text-white">

    <script src="./data.js"></script>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-lg border-b border-luxury-border">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-serif font-semibold tracking-tight text-luxury-text">KR.</a>
            <div class="flex items-center space-x-4 md:space-x-8 text-sm tracking-wide font-medium">
                <a href="#about" class="text-luxury-muted hover:text-luxury-accent transition-colors hidden md:block" id="nav-about"></a>
                <a href="#experience" class="text-luxury-muted hover:text-luxury-accent transition-colors hidden md:block" id="nav-experience"></a>
                <a href="#latest" class="text-luxury-muted hover:text-luxury-accent transition-colors hidden md:block" id="nav-latest"></a>
                <a href="#contact" class="text-luxury-muted hover:text-luxury-accent transition-colors hidden md:block" id="nav-contact"></a>
                <button id="lang-toggle" onclick="toggleLanguage()" class="bg-gray-100 text-luxury-text px-4 py-2 rounded-full hover:bg-gray-200 transition-colors shadow-sm"></button>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation Bar (Fixed Bottom) -->
    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[90%] bg-white/90 backdrop-blur-xl border border-luxury-border rounded-full px-6 py-4 shadow-2xl flex justify-around items-center">
        <a href="#about" class="text-luxury-text"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></a>
        <a href="#experience" class="text-luxury-text"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></a>
        <a href="#latest" class="text-luxury-text"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg></a>
        <a href="#contact" class="text-luxury-text"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></a>
    </div>

    <!-- Hero Section -->
    <header class="min-h-screen flex items-center justify-center px-6 pt-20 relative">
        <div class="max-w-4xl w-full text-center fade-in">
            <p class="text-luxury-accent tracking-[0.2em] uppercase text-xs font-semibold mb-6" id="hero-greeting"></p>
            <h1 class="text-4xl md:text-7xl font-serif mb-6 text-luxury-text leading-tight" id="hero-name"></h1>
            <h2 class="text-xl md:text-3xl font-light text-luxury-muted mb-8 italic" id="hero-title"></h2>
            <p class="max-w-2xl mx-auto text-luxury-muted leading-relaxed mb-12" id="hero-subtitle"></p>
            <a href="#latest" class="inline-block bg-luxury-text text-white px-8 py-4 rounded-full font-medium tracking-wide hover:bg-luxury-accent hover:shadow-pinterest transition-all duration-300" id="hero-cta"></a>
        </div>
    </header>

    <!-- About Section -->
    <section id="about" class="py-24 px-6">
        <div class="max-w-4xl mx-auto bg-white p-8 md:p-16 rounded-[2.5rem] shadow-pinterest">
            <div class="text-center mb-8">
                <h3 class="text-3xl font-serif text-luxury-text" id="about-title"></h3>
            </div>
            <p class="text-lg leading-relaxed text-luxury-muted font-light text-center" id="about-description"></p>
        </div>
    </section>

    <!-- Professional Experience Section -->
    <section id="experience" class="py-24 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center gap-6 mb-12">
                <h3 class="text-3xl font-serif text-luxury-text" id="experience-title"></h3>
                <div class="h-px bg-luxury-border flex-1"></div>
            </div>
            <div class="space-y-6" id="experience-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <!-- Latest Projects Section (New) -->
    <section id="latest" class="py-24 px-6 bg-white">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center gap-6 mb-12">
                <h3 class="text-3xl font-serif text-luxury-text" id="latest-title"></h3>
                <div class="h-px bg-luxury-border flex-1"></div>
            </div>
            <div class="masonry-grid" id="latest-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <!-- Leadership Section -->
    <section id="projects" class="py-24 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center gap-6 mb-12">
                <h3 class="text-3xl font-serif text-luxury-text" id="projects-title"></h3>
                <div class="h-px bg-luxury-border flex-1"></div>
            </div>
            <div class="masonry-grid" id="projects-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="py-32 px-6 text-center">
        <div class="max-w-2xl mx-auto bg-white p-12 rounded-[2.5rem] shadow-pinterest">
            <h3 class="text-4xl font-serif mb-6 text-white text-luxury-text" id="contact-title"></h3>
            <p class="text-luxury-muted mb-10 font-light leading-relaxed" id="contact-description"></p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a id="contact-email" href="" class="inline-block bg-luxury-text text-white px-8 py-4 rounded-full font-medium hover:bg-luxury-accent transition-all duration-300">Email Me</a>
                <a id="contact-linkedin" href="" target="_blank" class="inline-block border border-luxury-border text-luxury-text px-8 py-4 rounded-full font-medium hover:bg-gray-50 transition-all duration-300">LinkedIn</a>
            </div>
        </div>
    </section>

    <!-- Modal for Deep Details -->
    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white max-w-2xl w-full rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative fade-in max-h-[85vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-luxury-muted hover:text-luxury-text"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <footer class="py-24 text-center text-sm text-luxury-muted">
        <p>&copy; <span id="year"></span> Kelley Ryan. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
        let currentLang = 'en';

        function renderContent() {
            const data = siteData[currentLang];
            document.getElementById('nav-about').innerText = data.nav.about;
            document.getElementById('nav-experience').innerText = data.nav.experience;
            document.getElementById('nav-latest').innerText = data.nav.latest;
            document.getElementById('nav-contact').innerText = data.nav.contact;
            document.getElementById('lang-toggle').innerText = data.nav.languageToggle;
            document.getElementById('hero-greeting').innerText = data.hero.greeting;
            document.getElementById('hero-name').innerText = data.hero.name;
            document.getElementById('hero-title').innerText = data.hero.title;
            document.getElementById('hero-subtitle').innerText = data.hero.subtitle;
            document.getElementById('hero-cta').innerText = data.hero.cta;
            document.getElementById('about-title').innerText = data.about.title;
            document.getElementById('about-description').innerText = data.about.description;
            document.getElementById('experience-title').innerText = data.experience.title;
            const expList = document.getElementById('experience-list');
            expList.innerHTML = '';
            data.experience.items.forEach(item => {
                expList.innerHTML += `
                    <div onclick="openModal('experience', '${item.id}')" class="cursor-pointer bg-white p-8 rounded-3xl shadow-pinterest hover:shadow-pinterest-hover transition-all duration-300 flex flex-col md:flex-row md:gap-8 border border-gray-50">
                        <div class="md:w-1/3 text-luxury-accent font-semibold text-sm pt-1 mb-2 md:mb-0">${item.period}</div>
                        <div class="md:w-2/3">
                            <h4 class="text-xl text-luxury-text font-serif mb-1">${item.role}</h4>
                            <div class="text-luxury-muted text-sm font-medium mb-3">${item.company}</div>
                            <p class="text-luxury-muted font-light leading-relaxed text-sm">${item.shortDesc} <span class="text-luxury-accent underline ml-1">Detail</span></p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('latest-title').innerText = data.latestProjects.title;
            const latestList = document.getElementById('latest-list');
            latestList.innerHTML = '';
            data.latestProjects.items.forEach(item => {
                latestList.innerHTML += `
                    <div class="bg-pinterest-bg border border-luxury-border p-8 rounded-3xl hover:shadow-pinterest-hover transition-all duration-300 flex flex-col h-full">
                        <div class="text-luxury-accent text-xs font-bold tracking-widest uppercase mb-4">${item.category}</div>
                        <h4 class="text-2xl font-serif text-luxury-text mb-4">${item.title}</h4>
                        <p class="text-luxury-muted font-light leading-relaxed flex-grow text-sm mb-6">${item.description}</p>
                        <a href="${item.link}" class="text-sm font-medium text-luxury-text underline">Project Link</a>
                    </div>
                `;
            });
            document.getElementById('projects-title').innerText = data.projects.title;
            const projList = document.getElementById('projects-list');
            projList.innerHTML = '';
            data.projects.items.forEach(item => {
                projList.innerHTML += `
                    <div class="bg-white border border-luxury-border p-8 rounded-3xl hover:shadow-pinterest-hover transition-all duration-300">
                        <div class="text-luxury-accent text-xs font-bold tracking-widest uppercase mb-4">${item.category}</div>
                        <h4 class="text-2xl font-serif text-luxury-text mb-4">${item.name}</h4>
                        <p class="text-luxury-muted font-light leading-relaxed text-sm">${item.description}</p>
                    </div>
                `;
            });
            document.getElementById('contact-title').innerText = data.contact.title;
            document.getElementById('contact-description').innerText = data.contact.description;
            document.getElementById('contact-email').href = "mailto:" + data.contact.email;
            document.getElementById('contact-linkedin').href = data.contact.linkedin;
            document.documentElement.lang = currentLang;
        }

        function openModal(type, id) {
            const data = siteData[currentLang][type].items.find(i => i.id === id);
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="text-luxury-accent text-sm font-bold tracking-widest uppercase mb-4">${data.period}</div>
                <h4 class="text-3xl font-serif text-luxury-text mb-2">${data.role}</h4>
                <div class="text-xl text-luxury-muted mb-8">${data.company}</div>
                <div class="h-px bg-luxury-border mb-8"></div>
                <p class="text-lg leading-relaxed text-luxury-muted font-light">${data.fullDesc}</p>
            `;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            renderContent();
        }

        renderContent();
    </script>
</body>
</html>
